# =============================================================================
# PIPELINE CI/CD - Innovatech Chile (Despliegue via AWS Systems Manager SSM)
# NO requiere llaves SSH ni abrir el puerto 22 publicamente
# Usa las credenciales AWS del LabRole ya configurado en las instancias EC2
# =============================================================================

name: CI/CD - Build, Push y Deploy en EC2

on:
  push:
    branches:
      - deploy   # Disparador: push a la rama deploy
    tags:
      - 'v*'     # Disparador: push a tags semanticos (ej: v1.0.3)
  workflow_dispatch: # Permite disparar el workflow manualmente desde la web de GitHub

env:
  IMAGE_BACKEND:  ${{ secrets.DOCKER_USERNAME }}/innovatech-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend

jobs:

  # ===========================================================================
  # JOB 1: VALIDACION DE SINTAXIS (YAML Linter)
  # Evita fallos de sintaxis antes de compilar
  # ===========================================================================
  lint-yaml:
    name: 🔍 Validar Archivos YAML
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🐍 Validar sintaxis YAML
        run: |
          python3 -c "
          import yaml, glob, sys
          failed = False
          for f in glob.glob('**/*.yml', recursive=True) + glob.glob('**/*.yaml', recursive=True):
              if 'node_modules' in f: continue
              print(f'Validando: {f} ... ', end='')
              try:
                  with open(f) as file:
                      yaml.safe_load(file)
                  print('OK')
              except Exception as e:
                  print(f'ERROR: {e}')
                  failed = True
          if failed:
              sys.exit(1)
          "

  # ===========================================================================
  # JOB 2: PRUEBAS AUTOMATIZADAS Y CACHE
  # Ejecuta pruebas unitarias del backend usando Java y cachea dependencias Maven
  # ===========================================================================
  test-backend:
    name: 🧪 Pruebas Unitarias Backend
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: ☕ Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'  # Cachea las dependencias descargadas de Maven (.m2)

      - name: 🧪 Ejecutar Pruebas Maven
        run: |
          cd back-Ventas_SpringBoot/Springboot-API-REST
          mvn test -B

  # ===========================================================================
  # JOB 3: BUILD & PUSH
  # Compila las imagenes Docker, cachea capas y las sube a Docker Hub
  # ===========================================================================
  build-and-push:
    name: 🐳 Build y Push de Imagenes Docker
    runs-on: ubuntu-latest
    needs: [lint-yaml, test-backend]

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🏷️ Determinar Tag de Version Semantica
        id: get_version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: ⚙️ Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🔨 Build y Push - Backend (Spring Boot)
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          file: ./back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ steps.get_version.outputs.IS_TAG == 'true' && format('{0}:{1}', env.IMAGE_BACKEND, steps.get_version.outputs.VERSION) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔨 Build y Push - Frontend (React + Nginx)
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          file: ./front_despacho/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ steps.get_version.outputs.IS_TAG == 'true' && format('{0}:{1}', env.IMAGE_FRONTEND, steps.get_version.outputs.VERSION) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # JOB 4: DEPLOY VIA AWS SSM
  # ===========================================================================
  deploy:
    name: 🚀 Deploy Automatico en EC2 via SSM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Configura las credenciales AWS en el runner de GitHub
      # -----------------------------------------------------------------------
      - name: 🔑 Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      # -----------------------------------------------------------------------
      # Envia el archivo docker-compose.prod.yml a EC2 y ejecuta el despliegue
      # -----------------------------------------------------------------------
      - name: 🚀 Deploy via AWS SSM Send-Command
        env:
          DOCKER_USER:  ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS:  ${{ secrets.DOCKER_PASSWORD }}
          DB_ROOT:      ${{ secrets.DB_ROOT_PASSWORD }}
          DB_PASS:      ${{ secrets.DB_PASSWORD }}
          INSTANCE_ID:  ${{ secrets.EC2_WEB_INSTANCE_ID }}
        run: |
          sed "s|\${DOCKER_USERNAME}|$DOCKER_USER|g" docker-compose.prod.yml > /tmp/compose-final.yml
          COMPOSE_B64=$(base64 -w 0 /tmp/compose-final.yml)

          jq -n \
            --arg instance  "$INSTANCE_ID"  \
            --arg compose   "$COMPOSE_B64"  \
            --arg duser     "$DOCKER_USER"  \
            --arg dpass     "$DOCKER_PASS"  \
            --arg db_root   "$DB_ROOT"      \
            --arg db_pass   "$DB_PASS"      \
            '{
              "InstanceIds": [$instance],
              "DocumentName": "AWS-RunShellScript",
              "Comment": "Deploy Innovatech CI/CD",
              "Parameters": {
                "commands": [
                  "mkdir -p /home/ec2-user/innovatech",
                  "cd /home/ec2-user/innovatech",
                  ("printf \"%s\" \"" + $compose + "\" | base64 -d > docker-compose.yml"),
                  ("printf \"MYSQL_ROOT_PASSWORD=" + $db_root + "\nMYSQL_PASSWORD=" + $db_pass + "\nDB_PASSWORD=" + $db_pass + "\nDOCKER_USERNAME=" + $duser + "\n\" > .env"),
                  ("echo \"" + $dpass + "\" | docker login -u \"" + $duser + "\" --password-stdin"),
                  "docker compose pull",
                  "docker compose up -d --remove-orphans",
                  "docker image prune -f",
                  "docker compose ps"
                ]
              }
            }' > /tmp/ssm-input.json

          # Enviar el comando a la instancia EC2 y capturar el Command ID
          COMMAND_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/ssm-input.json \
            --query "Command.CommandId" \
            --output text)

          echo "📋 SSM Command ID: $COMMAND_ID"

          # Esperar a que el comando termine en la instancia EC2 (max ~3 minutos)
          echo "⏳ Esperando que el deploy termine en EC2..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          # Mostrar el resultado del comando ejecutado en EC2 (para los logs del pipeline)
          echo "📄 Output del deploy en EC2:"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text

      - name: ✅ Deploy completado
        run: |
          echo "=========================================="
          echo "  ✅ Deploy exitoso en EC2!"
          echo "  Commit : ${{ github.sha }}"
          echo "  Rama   : ${{ github.ref_name }}"
          echo "  Actor  : ${{ github.actor }}"
          echo "=========================================="
