worker_processes auto;

# El proceso del worker escribe el PID aqui (directorio con permisos para el usuario nginx)
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs en stdout/stderr para que Docker los capture
    access_log /dev/stdout;
    error_log  /dev/stderr;

    sendfile        on;
    keepalive_timeout  65;

    server {
        # Puerto no privilegiado (>1024), compatible con usuario no root
        listen 3000;

        root /usr/share/nginx/html;
        index index.html;

        # Soporte para React Router (SPA): cualquier ruta desconocida
        # devuelve index.html, y React maneja el routing en el cliente
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy reverso: redirige las llamadas /api/v1/ventas
        # al servicio backend en la red interna de Docker/AWS
        location /api/v1/ventas {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy reverso: redirige las llamadas /api/v1/despachos
        # al servicio backend en la red interna de Docker/AWS
        location /api/v1/despachos {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Archivos de cache: assets estaticos con header de larga duracion
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
