# =============================================================================
# DOCKER COMPOSE - PRODUCCION (EC2)
# Esta version usa imagenes pre-compiladas desde Docker Hub
# NO usa "build:", a diferencia de docker-compose.yml (desarrollo local)
# Se despliega automaticamente via el pipeline CI/CD en GitHub Actions
# =============================================================================

services:

  # ===========================================================================
  # SERVICIO 1: Base de Datos (MySQL 8.0)
  # ===========================================================================
  db:
    image: mysql:8.0
    container_name: innovatech-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ventas_db
      MYSQL_USER: springuser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # SERVICIO 2: Backend (imagen desde Docker Hub, NO compilacion local)
  # ===========================================================================
  backend:
    image: bhernandezb2812/innovatech-backend:latest
    container_name: innovatech-backend
    restart: always
    environment:
      DB_ENDPOINT: db
      DB_PORT: 3306
      DB_NAME: ventas_db
      DB_USERNAME: springuser
      DB_PASSWORD: ${MYSQL_PASSWORD}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - frontend_network
      - backend_network
    depends_on:
      db:
        condition: service_healthy

  # ===========================================================================
  # SERVICIO 3: Frontend (imagen desde Docker Hub, NO compilacion local)
  # ===========================================================================
  frontend:
    image: bhernandezb2812/innovatech-frontend:latest
    container_name: innovatech-frontend
    restart: always
    ports:
      - "80:3000"
    networks:
      - frontend_network
    depends_on:
      - backend

networks:
  frontend_network:
    driver: bridge
    name: innovatech-frontend-net
  backend_network:
    driver: bridge
    name: innovatech-backend-net

volumes:
  db_data:
    name: innovatech-db-data
